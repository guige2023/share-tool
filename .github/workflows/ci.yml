name: CI

on:
  push:
    branches: [main, fix/clipboard-p0-fixes]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────────────────────
  # Go Server Build (all platforms)
  # ─────────────────────────────────────────────────────────────
  build-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: go/go.sum

      - name: Download Go modules
        run: cd go && go mod download

      - name: Build macOS (amd64)
        run: cd go && GOOS=darwin GOARCH=amd64 go build -o ../artifacts/sharetool_darwin_amd64 .
        working-directory: .

      - name: Build macOS (arm64)
        run: cd go && GOOS=darwin GOARCH=arm64 go build -o ../artifacts/sharetool_darwin_arm64 .
        working-directory: .

      - name: Build Windows
        run: cd go && GOOS=windows GOARCH=amd64 go build -o ../artifacts/sharetool_windows_amd64.exe .
        working-directory: .

      - name: Build Linux
        run: cd go && GOOS=linux GOARCH=amd64 go build -o ../artifacts/sharetool_linux_amd64 .
        working-directory: .

      - name: Upload server binaries
        uses: actions/upload-artifact@v4
        with:
          name: sharetool-server-binaries
          path: artifacts/*
          retention-days: 3

  # ─────────────────────────────────────────────────────────────
  # Windows C# Tray App
  # ─────────────────────────────────────────────────────────────
  build-windows-app:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.201'

      - name: Build Windows Tray App
        run: |
          cd app/ShareTool/ClipboardSync
          dotnet restore
          dotnet build -c Release -r win-x64 --self-contained false
        working-directory: .

      - name: Copy tray app
        run: |
          mkdir -p artifacts
          cp app/ShareTool/ClipboardSync/bin/Release/net10.0-windows/win-x64/ShareToolClipboardSync.exe artifacts/

      - name: Upload Windows app
        uses: actions/upload-artifact@v4
        with:
          name: sharetool-windows-app
          path: artifacts/*
          retention-days: 3

  # ─────────────────────────────────────────────────────────────
  # macOS App (menu bar app)
  # ─────────────────────────────────────────────────────────────
  build-macos-app:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: go/go.sum

      - name: Setup XcodeGen
        run: |
          # Install xcodegen if not present
          if ! command -v xcodegen &> /dev/null; then
            brew install xcodegen
          fi
          xcodegen --version

      - name: Build macOS App
        run: |
          REPO="$PWD"
          # Regenerate .xcodeproj from project.yml (in case it was updated)
          cd "$REPO/app/ShareTool"
          xcodegen generate
          ls -la ShareTool.xcodeproj/

          # Build Go binaries for both architectures (output to app/ShareTool/)
          cd "$REPO/go"
          GOOS=darwin GOARCH=arm64 go build -o ../app/ShareTool/sharetool_darwin_arm64 .
          GOOS=darwin GOARCH=amd64 go build -o ../app/ShareTool/sharetool_darwin_amd64 .
          ls -la "$REPO/app/ShareTool/sharetool_darwin_amd64"

          # Build macOS app with xcodebuild
          cd "$REPO/app/ShareTool"
          xcodebuild -project ShareTool.xcodeproj -scheme ShareTool -configuration Release -derivedDataPath ./build APP_CODE_SIGN_IDENTITY="-" CODE_SIGNING_REQUIRED=NO > /tmp/xcodebuild.log 2>&1
          XCODE_EXIT=${PIPESTATUS[0]}
          tail -30 /tmp/xcodebuild.log
          echo "xcodebuild exit code: $XCODE_EXIT"
          if [ $XCODE_EXIT -ne 0 ]; then
            echo "ERROR: xcodebuild failed"
            exit 1
          fi

          # Verify .app exists
          APP_PATH=$(find build -name "ShareTool.app" -maxdepth 5 2>/dev/null | head -1)
          if [ -n "$APP_PATH" ]; then
            echo "macOS app built: $APP_PATH"
            echo "App size: $(du -sh "$APP_PATH" | cut -f1)"
            mkdir -p artifacts
            cp -r "$APP_PATH" artifacts/
            echo "Copied to artifacts. Size: $(du -sh artifacts/ShareTool.app | cut -f1)"
          else
            echo "ERROR: ShareTool.app not found"
            ls -la build/ 2>/dev/null || echo "no build dir"
            find build -name "*.app" 2>/dev/null || echo "no .app found"
            exit 1
          fi
        working-directory: .

      - name: Upload macOS app
        uses: actions/upload-artifact@v4
        with:
          name: sharetool-macos-app
          path: app/ShareTool/artifacts/ShareTool.app
          retention-days: 3
