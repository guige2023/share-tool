name: CI

on:
  push:
    branches: [main, fix/clipboard-p0-fixes]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────────────────────
  # Go Server Build (all platforms)
  # ─────────────────────────────────────────────────────────────
  build-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: go/go.sum

      - name: Download Go modules
        run: cd go && go mod download

      - name: Build macOS (amd64)
        run: cd go && GOOS=darwin GOARCH=amd64 go build -o ../artifacts/sharetool_darwin_amd64 .
        working-directory: .

      - name: Build macOS (arm64)
        run: cd go && GOOS=darwin GOARCH=arm64 go build -o ../artifacts/sharetool_darwin_arm64 .
        working-directory: .

      - name: Build Windows
        run: cd go && GOOS=windows GOARCH=amd64 go build -o ../artifacts/sharetool_windows_amd64.exe .
        working-directory: .

      - name: Build Linux
        run: cd go && GOOS=linux GOARCH=amd64 go build -o ../artifacts/sharetool_linux_amd64 .
        working-directory: .

      - name: Upload server binaries
        uses: actions/upload-artifact@v4
        with:
          name: sharetool-server-binaries
          path: artifacts/*
          retention-days: 3

  # ─────────────────────────────────────────────────────────────
  # Windows C# Tray App
  # ─────────────────────────────────────────────────────────────
  build-windows-app:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.201'

      - name: Build Windows Tray App
        run: |
          cd app/ShareTool/ClipboardSync
          dotnet restore
          dotnet build -c Release -r win-x64 --self-contained false
        working-directory: .

      - name: Copy tray app
        run: |
          mkdir -p artifacts
          cp app/ShareTool/ClipboardSync/bin/Release/net10.0-windows/win-x64/ShareToolClipboardSync.exe artifacts/

      - name: Upload Windows app
        uses: actions/upload-artifact@v4
        with:
          name: sharetool-windows-app
          path: artifacts/*
          retention-days: 3

  # ─────────────────────────────────────────────────────────────
  # macOS App (menu bar app)
  # ─────────────────────────────────────────────────────────────
  build-macos-app:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: go/go.sum

      - name: Setup XcodeGen
        run: |
          if ! command -v xcodegen &> /dev/null; then
            brew install xcodegen
          fi
          xcodegen --version

      - name: Build Go binary for macOS
        run: |
          REPO="$PWD"
          cd "$REPO/go"
          GOOS=darwin GOARCH=arm64 go build -o ../app/ShareTool/sharetool_darwin_arm64 .
          GOOS=darwin GOARCH=amd64 go build -o ../app/ShareTool/sharetool_darwin_amd64 .
          lipo -create ../app/ShareTool/sharetool_darwin_arm64 ../app/ShareTool/sharetool_darwin_amd64 -output ../app/ShareTool/sharetool_darwin_fat
          chmod +x ../app/ShareTool/sharetool_darwin_fat
          echo "Go universal binary: $(ls -lh ../app/ShareTool/sharetool_darwin_fat | awk '{print $5}')"

      - name: Build macOS App
        run: |
          REPO="$PWD"
          # Regenerate .xcodeproj from project.yml
          cd "$REPO/app/ShareTool"
          xcodegen generate

          # Build macOS app with xcodebuild
          set +e
          xcodebuild -project ShareTool.xcodeproj -scheme ShareTool -configuration Release -derivedDataPath ./build APP_CODE_SIGN_IDENTITY="-" CODE_SIGNING_REQUIRED=NO 2>&1 | tee /tmp/xcodebuild.log
          XCODE_EXIT=${PIPESTATUS[0]}
          set -e
          echo "xcodebuild exit code: $XCODE_EXIT"
          tail -30 /tmp/xcodebuild.log
          if [ $XCODE_EXIT -ne 0 ]; then
            echo "ERROR: xcodebuild failed"
            exit 1
          fi

          # Find built .app
          APP_PATH=$(find build -name "ShareTool.app" -maxdepth 5 2>/dev/null | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: ShareTool.app not found"
            find build -name "*.app" 2>/dev/null
            exit 1
          fi
          echo "macOS app built: $APP_PATH ($(du -sh "$APP_PATH" | cut -f1))"

          # Create artifacts directory and place Go binary OUTSIDE the .app bundle
          mkdir -p "$REPO/artifacts"
          GO_BIN="$REPO/app/ShareTool/sharetool_darwin_fat"
          cp "$GO_BIN" "$REPO/artifacts/sharetool"
          chmod +x "$REPO/artifacts/sharetool"
          echo "Go binary placed at $REPO/artifacts/sharetool ($(ls -lh "$REPO/artifacts/sharetool" | awk '{print $5}'))"

          # Copy .app to artifacts (zip separately)
          cp -r "$APP_PATH" "$REPO/artifacts/ShareTool.app"
          echo "App copied to artifacts ($(du -sh "$REPO/artifacts/ShareTool.app" | cut -f1))"

          # Zip .app bundle preserving directory structure
          cd "$REPO/artifacts"
          zip -r ShareTool.app.zip ShareTool.app
          echo "Zipped: $(ls -lh ShareTool.app.zip | awk '{print $5}')"
        working-directory: .

      - name: Upload macOS app
        uses: actions/upload-artifact@v4
        with:
          name: sharetool-macos-app
          path: artifacts/ShareTool.app.zip
          retention-days: 3

      - name: Upload standalone Go binary
        uses: actions/upload-artifact@v4
        with:
          name: sharetool-darwin-fat
          path: artifacts/sharetool
          retention-days: 3
