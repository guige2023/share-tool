name: CI

on:
  push:
    branches: [main, fix/clipboard-p0-fixes]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────────────────────
  # Go Server Build (all platforms)
  # ─────────────────────────────────────────────────────────────
  build-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: go/go.sum

      - name: Download Go modules
        run: cd go && go mod download

      - name: Build macOS (amd64)
        run: cd go && GOOS=darwin GOARCH=amd64 go build -o ../artifacts/sharetool_darwin_amd64 .
        working-directory: .

      - name: Build macOS (arm64)
        run: cd go && GOOS=darwin GOARCH=arm64 go build -o ../artifacts/sharetool_darwin_arm64 .
        working-directory: .

      - name: Build Windows
        run: cd go && GOOS=windows GOARCH=amd64 go build -o ../artifacts/sharetool_windows_amd64.exe .
        working-directory: .

      - name: Build Linux
        run: cd go && GOOS=linux GOARCH=amd64 go build -o ../artifacts/sharetool_linux_amd64 .
        working-directory: .

      - name: Upload server binaries
        uses: actions/upload-artifact@v4
        with:
          name: sharetool-server-binaries
          path: artifacts/*
          retention-days: 3

  # ─────────────────────────────────────────────────────────────
  # Windows C# Tray App
  # ─────────────────────────────────────────────────────────────
  build-windows-app:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.201'

      - name: Build Windows Tray App
        run: |
          cd app/ShareTool/ClipboardSync
          dotnet restore
          dotnet build -c Release -r win-x64 --self-contained false
        working-directory: .

      - name: Copy tray app
        run: |
          mkdir -p artifacts
          cp app/ShareTool/ClipboardSync/bin/Release/net10.0-windows/win-x64/ShareToolClipboardSync.exe artifacts/

      - name: Upload Windows app
        uses: actions/upload-artifact@v4
        with:
          name: sharetool-windows-app
          path: artifacts/*
          retention-days: 3

  # ─────────────────────────────────────────────────────────────
  # macOS App (menu bar app)
  # ─────────────────────────────────────────────────────────────
  build-macos-app:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: go/go.sum

      - name: Build macOS App
        run: |
          # Build Go binary for macOS arm64 (Apple Silicon)
          cd go
          GOOS=darwin GOARCH=arm64 go build -o ../sharetool_darwin_arm64 .
          # Also build amd64 and place at the path Xcode project expects
          GOOS=darwin GOARCH=amd64 go build -o ../sharetool_darwin_amd64 .
          cd ..

          # Verify binaries
          ls -la sharetool_darwin_arm64 sharetool_darwin_amd64

          # Build macOS app with xcodebuild
          cd app/ShareTool
          xcodebuild -project ShareTool.xcodeproj -scheme ShareTool -configuration Release -derivedDataPath ./build APP_CODE_SIGN_IDENTITY="-" CODE_SIGNING_REQUIRED=NO 2>&1 | tail -20

          # Verify .app exists
          ls -la build/Build/Products/Release/*.app 2>/dev/null || ls -la build/*.app 2>/dev/null || find build -name "*.app" -maxdepth 4 2>/dev/null

          # Copy .app to artifacts
          APP_PATH=$(find build -name "ShareTool.app" -maxdepth 5 2>/dev/null | head -1)
          if [ -n "$APP_PATH" ]; then
            mkdir -p artifacts
            cp -r "$APP_PATH" artifacts/
            echo "macOS app built: $APP_PATH"
          else
            echo "ERROR: ShareTool.app not found"
            ls -la build/ 2>/dev/null
            find build -name "*.app" 2>/dev/null || echo "no .app found"
            exit 1
          fi
        working-directory: .

      - name: Upload macOS app
        uses: actions/upload-artifact@v4
        with:
          name: sharetool-macos-app
          path: app/ShareTool/artifacts/ShareTool.app
          retention-days: 3
