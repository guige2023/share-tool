<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ShareTool</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #f5f5f7;
  color: #1d1d1f;
  min-height: 100vh;
}

header {
  background: #1d1d1f;
  color: #fff;
  padding: 12px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky;
  top: 0;
  z-index: 100;
}

header h1 { font-size: 18px; font-weight: 600; }

.header-right {
  display: flex;
  align-items: center;
  gap: 10px;
}

header .ip {
  font-size: 12px;
  color: #a1a1a6;
  background: #2c2c2e;
  padding: 4px 10px;
  border-radius: 12px;
}

/* Tab Navigation */
.tabs {
  display: flex;
  background: #fff;
  border-bottom: 1px solid #e5e5ea;
  position: sticky;
  top: 52px;
  z-index: 99;
}

.tab {
  flex: 1;
  padding: 12px 8px;
  text-align: center;
  font-size: 14px;
  font-weight: 500;
  color: #86868b;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all .2s;
}

.tab.active {
  color: #0071e3;
  border-bottom-color: #0071e3;
}

.container {
  max-width: 800px;
  margin: 0 auto;
  padding: 16px;
}

.panel { display: none; }
.panel.active { display: block; }

/* Text Section */
.text-section {
  background: #fff;
  border-radius: 12px;
  padding: 16px;
  box-shadow: 0 1px 3px rgba(0,0,0,.08);
}

.text-section h2 {
  font-size: 13px;
  font-weight: 600;
  color: #86868b;
  margin-bottom: 12px;
  text-transform: uppercase;
  letter-spacing: .5px;
}

.text-row {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
}

.text-row input {
  flex: 1;
  padding: 12px 14px;
  border: 1px solid #d2d2d7;
  border-radius: 10px;
  font-size: 16px;
  outline: none;
  min-height: 48px;
}

.text-row input:focus { border-color: #0071e3; }

.text-row button {
  padding: 12px 20px;
  background: #0071e3;
  color: #fff;
  border: none;
  border-radius: 10px;
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
  min-height: 48px;
}

.text-row button:active { background: #005bb5; }

.text-latest {
  font-size: 13px;
  color: #86868b;
  min-height: 20px;
  padding: 8px 12px;
  background: #f5f5f7;
  border-radius: 8px;
  word-break: break-all;
}

/* Upload Section */
.upload-section {
  background: #fff;
  border-radius: 12px;
  padding: 16px;
  box-shadow: 0 1px 3px rgba(0,0,0,.08);
}

.upload-section h2,
.file-section h2,
.devices-section h2 {
  font-size: 13px;
  font-weight: 600;
  color: #86868b;
  margin-bottom: 12px;
  text-transform: uppercase;
}

.drop-zone {
  border: 2px dashed #d2d2d7;
  border-radius: 12px;
  padding: 40px 20px;
  text-align: center;
  cursor: pointer;
  transition: border-color .2s, background .2s;
  margin-bottom: 12px;
}

.drop-zone:hover,
.drop-zone.dragover {
  border-color: #0071e3;
  background: rgba(0,113,227,.04);
}

.drop-zone p { color: #86868b; font-size: 15px; }
.drop-zone .hint { font-size: 12px; margin-top: 6px; }

.drop-icon {
  font-size: 36px;
  margin-bottom: 12px;
}

#fileInput { display: none; }

.progress-wrap { display: none; margin-bottom: 12px; }

.progress-bar-bg {
  background: #e5e5ea;
  border-radius: 4px;
  height: 8px;
  overflow: hidden;
}

.progress-bar-fill {
  background: linear-gradient(90deg, #0071e3, #5ac8fa);
  height: 100%;
  width: 0%;
  transition: width .3s ease;
  border-radius: 4px;
}

.progress-text {
  font-size: 12px;
  color: #86868b;
  margin-top: 4px;
  text-align: center;
}

.upload-status {
  font-size: 13px;
  margin-top: 8px;
}

.upload-status .ok { color: #34c759; }
.upload-status .err { color: #ff3b30; }

/* File List */
.file-section {
  background: #fff;
  border-radius: 12px;
  padding: 16px;
  box-shadow: 0 1px 3px rgba(0,0,0,.08);
}

.file-section .header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}

.file-section .refresh-btn {
  background: none;
  border: 1px solid #d2d2d7;
  border-radius: 8px;
  padding: 6px 14px;
  font-size: 13px;
  cursor: pointer;
  color: #0071e3;
}

.file-table {
  width: 100%;
  border-collapse: collapse;
}

.file-table th {
  text-align: left;
  font-size: 11px;
  color: #86868b;
  padding: 6px 4px;
  border-bottom: 1px solid #e5e5ea;
  text-transform: uppercase;
}

.file-table td {
  padding: 10px 4px;
  border-bottom: 1px solid #f5f5f7;
  font-size: 14px;
}

.file-table tr:last-child td { border-bottom: none; }

.file-name { font-weight: 500; word-break: break-all; }
.file-meta { color: #86868b; font-size: 12px; margin-top: 2px; }
.file-actions { display: flex; gap: 6px; justify-content: flex-end; }

.file-actions a { text-decoration: none; }

.file-actions button {
  padding: 5px 12px;
  border: none;
  border-radius: 6px;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
}

.file-actions .dl-btn {
  background: #0071e3;
  color: #fff;
}

.file-actions .del-btn {
  background: #ff3b30;
  color: #fff;
}

.file-actions button:active { opacity: .8; }

.empty-state {
  text-align: center;
  padding: 32px;
  color: #86868b;
  font-size: 14px;
}

/* Devices Section */
.devices-section {
  background: #fff;
  border-radius: 12px;
  padding: 16px;
  box-shadow: 0 1px 3px rgba(0,0,0,.08);
}

.device-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.device-card {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px;
  background: #f5f5f7;
  border-radius: 10px;
}

.device-icon {
  width: 40px;
  height: 40px;
  background: #0071e3;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}

.device-icon.computer { background: #0071e3; }
.device-icon.phone { background: #34c759; }
.device-icon.tablet { background: #ff9500; }

.device-info { flex: 1; min-width: 0; }
.device-name { font-weight: 600; font-size: 14px; }
.device-addr { font-size: 12px; color: #86868b; margin-top: 2px; }
.device-time { font-size: 11px; color: #aeaeb2; margin-top: 2px; }

.device-status {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #34c759;
  flex-shrink: 0;
}

.device-status.offline { background: #ff3b30; }

.add-device-btn {
  width: 100%;
  padding: 14px;
  border: 2px dashed #d2d2d7;
  border-radius: 10px;
  background: none;
  color: #86868b;
  font-size: 14px;
  cursor: pointer;
  margin-top: 10px;
}

.add-device-btn:hover { border-color: #0071e3; color: #0071e3; }

/* QR Code Card */
.qr-card {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 16px;
  background: #f5f5f7;
  border-radius: 12px;
  margin-bottom: 16px;
}

.qr-info { flex: 1; }

.qr-url {
  font-size: 14px;
  font-weight: 500;
  color: #1d1d1f;
  word-break: break-all;
  margin-bottom: 6px;
}

.qr-hint {
  font-size: 12px;
  color: #86868b;
}

#qrImg {
  flex-shrink: 0;
}

/* Mobile */
@media (max-width: 600px) {
  .container { padding: 12px; }
  .file-actions { flex-wrap: wrap; }
  .file-table th:nth-child(2),
  .file-table td:nth-child(2) { display: none; }
  .drop-zone { padding: 30px 16px; }
}
</style>
</head>
<body>

<header>
  <h1>ShareTool</h1>
  <div class="header-right">
    <span class="ip" id="serverInfo">--</span>
  </div>
</header>

<!-- Tab Navigation -->
<div class="tabs">
  <div class="tab active" data-tab="files">📁 文件</div>
  <div class="tab" data-tab="text">📝 剪贴板</div>
  <div class="tab" data-tab="devices">💻 设备</div>
</div>

<div class="container">
  <!-- Files Tab -->
  <div class="panel active" id="panel-files">
    <!-- Upload -->
    <div class="upload-section" style="margin-top:16px;">
      <div class="drop-zone" id="dropZone"
           onclick="document.getElementById('fileInput').click()">
        <div class="drop-icon">📤</div>
        <p>点击选择文件 / 拖拽文件到此处</p>
        <p class="hint">支持大文件分片断点续传</p>
      </div>
      <input type="file" id="fileInput" multiple />
      <div class="progress-wrap" id="progressWrap">
        <div class="progress-bar-bg">
          <div class="progress-bar-fill" id="progressFill"></div>
        </div>
        <div class="progress-text" id="progressText">0%</div>
      </div>
      <div class="upload-status" id="uploadStatus"></div>
    </div>

    <!-- File List -->
    <div class="file-section" style="margin-top:16px;">
      <div class="header">
        <h2>文件列表</h2>
        <button class="refresh-btn" onclick="loadFiles()">刷新</button>
      </div>
      <div id="fileList"></div>
    </div>
  </div>

  <!-- Text Tab -->
  <div class="panel" id="panel-text">
    <div class="text-section" style="margin-top:16px;">
      <h2>发送文本</h2>
      <div class="text-row">
        <input id="textInput" placeholder="输入文本，发送给局域网内所有设备..." />
        <button onclick="sendText()">发送</button>
      </div>
      <div class="text-latest" id="textLatest">等待接收文本...</div>
    </div>
  </div>

  <!-- Devices Tab -->
  <div class="panel" id="panel-devices">
    <!-- QR Code Card -->
    <div class="devices-section" style="margin-top:16px;">
      <h2>手机扫码访问</h2>
      <div class="qr-card">
        <div class="qr-info">
          <p class="qr-url" id="qrUrl">--</p>
          <p class="qr-hint">用微信/相机扫码或在浏览器打开</p>
        </div>
        <img id="qrImg" width="160" height="160" style="border-radius:8px;border:4px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.1);flex-shrink:0;" />
      </div>
    </div>

    <!-- Peers List -->
    <div class="devices-section" style="margin-top:16px;">
      <h2>局域网设备</h2>
      <div class="device-list" id="deviceList">
        <div class="empty-state">正在搜索设备...</div>
      </div>
      <button class="add-device-btn" onclick="showAddDevice()">+ 添加设备</button>
    </div>
  </div>
</div>

<script>
// Tab navigation
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('panel-' + tab.dataset.tab).classList.add('active');
    if (tab.dataset.tab === 'devices') loadDevices();
  });
});

const API = {
  base: '',
  async request(url, opts) {
    const res = await fetch(this.base + url, opts);
    if (!res.ok) throw new Error('Request failed: ' + res.status);
    return res.json();
  },
  sendText(content) {
    return this.request('/api/text', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({content})
    });
  },
  getLatestText() {
    return this.request('/api/text/latest');
  },
  listFiles() {
    return this.request('/api/files');
  },
  putFile(name, blob, offset, total) {
    return new Promise((resolve, reject) => {
      const xhr = new XMLHttpRequest();
      xhr.open('PUT', this.base + '/api/files/' + encodeURIComponent(name));
      if (offset !== undefined) {
        const end = offset + blob.size - 1;
        xhr.setRequestHeader('Content-Range', `bytes ${offset}-${end}/${total}`);
      }
      xhr.onload = () => {
        try { resolve(JSON.parse(xhr.responseText)); }
        catch { resolve({success: true}); }
      };
      xhr.onerror = () => reject(new Error('Network error'));
      xhr.send(blob);
    });
  },
  deleteFile(name) {
    return this.request('/api/files/' + encodeURIComponent(name), {method: 'DELETE'});
  },
  listPeers() {
    return this.request('/api/peers');
  },
  registerPeer(ip, port) {
    return this.request('/api/peers', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({name: deviceName(), ip, port})
    });
  }
};

// Detect server base URL
(function detectBase() {
  const proto = location.protocol === 'https:' ? 'https:' : 'http:';
  const port = location.port || (proto === 'https:' ? '443' : '80');
  API.base = proto + '//' + location.hostname + ':' + port;
  document.getElementById('serverInfo').textContent = location.host;
})();

function deviceName() {
  return navigator.platform || 'Unknown';
}

// Text
async function sendText() {
  const input = document.getElementById('textInput');
  const content = input.value.trim();
  if (!content) return;
  try {
    await API.sendText(content);
    input.value = '';
  } catch(e) {
    alert('发送失败: ' + e.message);
  }
}

async function pollText() {
  try {
    const data = await API.getLatestText();
    const el = document.getElementById('textLatest');
    if (data.content) {
      const ago = data.timestamp ? timeAgo(data.timestamp) : '';
      el.innerHTML = '<strong>最新:</strong> ' + escHtml(data.content) + (ago ? ' (' + ago + ')' : '');
    }
  } catch {}
}

function timeAgo(ts) {
  const diff = Date.now() - ts;
  if (diff < 60000) return Math.floor(diff/1000) + '秒前';
  if (diff < 3600000) return Math.floor(diff/60000) + '分钟前';
  return Math.floor(diff/3600000) + '小时前';
}

// Upload
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const CHUNK = 2 * 1024 * 1024; // 2MB chunks

['dragenter','dragover'].forEach(ev => {
  dropZone.addEventListener(ev, e => { e.preventDefault(); dropZone.classList.add('dragover'); });
});
['dragleave','drop'].forEach(ev => {
  dropZone.addEventListener(ev, e => { e.preventDefault(); dropZone.classList.remove('dragover'); });
});

dropZone.addEventListener('drop', e => {
  fileInput.files = e.dataTransfer.files;
  if (fileInput.files.length) uploadFiles();
});

fileInput.addEventListener('change', () => {
  if (fileInput.files.length) uploadFiles();
});

async function uploadFiles() {
  const files = Array.from(fileInput.files);
  if (!files.length) return;
  const status = document.getElementById('uploadStatus');
  const progressWrap = document.getElementById('progressWrap');
  status.innerHTML = '';

  for (const file of files) {
    progressWrap.style.display = 'block';
    try {
      await uploadFile(file, file.name, file.size);
      status.innerHTML += '<p class="ok">✓ ' + escHtml(file.name) + ' 上传完成</p>';
    } catch(e) {
      status.innerHTML += '<p class="err">✗ ' + escHtml(file.name) + ': ' + e.message + '</p>';
    }
  }
  fileInput.value = '';
  progressWrap.style.display = 'none';
  loadFiles();
}

async function uploadFile(file, name, total) {
  const fill = document.getElementById('progressFill');
  const text = document.getElementById('progressText');
  let offset = 0;

  while (offset < total) {
    const chunk = file.slice(offset, offset + CHUNK);
    const pct = Math.round((offset + chunk.size) / total * 100);
    fill.style.width = pct + '%';
    text.textContent = name + ' ' + pct + '%';
    await API.putFile(name, chunk, offset, total);
    offset += CHUNK;
  }
  fill.style.width = '100%';
  text.textContent = '100%';
}

// Files
async function loadFiles() {
  try {
    const data = await API.listFiles();
    const list = document.getElementById('fileList');
    if (!data.files || !data.files.length) {
      list.innerHTML = '<div class="empty-state">暂无文件，上传一个试试</div>';
      return;
    }
    const rows = ['<table class="file-table"><thead><tr><th>文件名</th><th>大小</th><th>时间</th><th></th></tr></thead><tbody>'];
    for (const f of data.files) {
      const url = API.base + '/api/files/' + encodeURIComponent(f.name);
      rows.push('<tr>' +
        '<td class="file-name">' + escHtml(f.name) + '<div class="file-meta">' + formatBytes(f.size) + '</div></td>' +
        '<td>' + timeAgo(f.updatedAt) + '</td>' +
        '<td class="file-actions">' +
          '<a href="' + url + '" download="' + escHtml(f.name) + '"><button class="dl-btn">下载</button></a>' +
          '<button class="del-btn" onclick="doDelete(\'' + escHtml(f.name).replace(/'/g, "\\'") + '\')">删除</button>' +
        '</td>' +
      '</tr>');
    }
    rows.push('</tbody></table>');
    list.innerHTML = rows.join('');
  } catch(e) {
    document.getElementById('fileList').innerHTML =
      '<div class="empty-state">加载失败: ' + escHtml(e.message) + '</div>';
  }
}

async function doDelete(name) {
  if (!confirm('确认删除 ' + name + '？')) return;
  try {
    await API.deleteFile(name);
    loadFiles();
  } catch(e) {
    alert('删除失败: ' + e.message);
  }
}

function formatBytes(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1048576) return (bytes/1024).toFixed(1) + ' KB';
  if (bytes < 1073741824) return (bytes/1048576).toFixed(1) + ' MB';
  return (bytes/1073741824).toFixed(2) + ' GB';
}

function escHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

// Devices
async function loadDevices() {
  const list = document.getElementById('deviceList');
  try {
    const data = await API.listPeers();
    if (!data.peers || !data.peers.length) {
      list.innerHTML = '<div class="empty-state">同一服务器上的其他设备将显示在这里</div>';
      return;
    }
    list.innerHTML = data.peers.map(p => {
      const type = p.name.toLowerCase().includes('iphone') || p.name.toLowerCase().includes('android') ? 'phone' : 
                   p.name.toLowerCase().includes('ipad') || p.name.toLowerCase().includes('tablet') ? 'tablet' : 'computer';
      const icon = type === 'phone' ? '📱' : type === 'tablet' ? '📲' : '💻';
      return '<div class="device-card">' +
        '<div class="device-icon ' + type + '">' + icon + '</div>' +
        '<div class="device-info">' +
          '<div class="device-name">' + escHtml(p.name) + '</div>' +
          '<div class="device-addr">' + escHtml(p.ip) + ':' + p.port + '</div>' +
          '<div class="device-time">最后活跃: ' + timeAgo(p.updatedAt) + '</div>' +
        '</div>' +
        '<div class="device-status"></div>' +
      '</div>';
    }).join('');
  } catch(e) {
    list.innerHTML = '<div class="empty-state">加载设备列表失败</div>';
  }
}

let devicePollInterval = null;

function showAddDevice() {
  const addr = prompt('输入其他 ShareTool 设备的地址（如 192.168.1.100:18790）：');
  if (!addr) return;
  try {
    const [ip, port] = addr.split(':');
    API.registerPeer(ip, parseInt(port));
    alert('设备已添加（需要对方也打开设备列表页面才能看到）');
  } catch(e) {
    alert('添加失败: ' + e.message);
  }
}

// Init
loadFiles();
setInterval(pollText, 3000);

// QR Code via backend /api/qr endpoint (uses skip2/go-qrcode library)
function updateQR() {
  var url = location.href;
  document.getElementById('qrUrl').textContent = url;
  document.getElementById('qrImg').src = API.base + '/api/qr?url=' + encodeURIComponent(url);
}

// Update QR when devices tab opens
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    if (tab.dataset.tab === 'devices') {
      setTimeout(updateQR, 50);
    }
  });
});

// Update QR when page loads
window.addEventListener('load', updateQR);
</script>
<div style="text-align:center;padding:20px;font-size:12px;color:#86868b;">
  <a href="/openapi.json" style="color:#0071e3;">OpenAPI</a> ·
  <a href="/tools.json" style="color:#0071e3;">AI Tools</a> ·
  ShareTool v1.0
</div>
</body>
</html>
