<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShareTool</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #f5f5f7;
  color: #1d1d1f;
  min-height: 100vh;
}

header {
  background: #1d1d1f;
  color: #fff;
  padding: 12px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

header h1 { font-size: 18px; font-weight: 600; }
header .ip {
  font-size: 13px;
  color: #a1a1a6;
  background: #2c2c2e;
  padding: 4px 10px;
  border-radius: 12px;
}

.container {
  max-width: 800px;
  margin: 0 auto;
  padding: 20px;
}

/* Text Section */
.text-section {
  background: #fff;
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 16px;
  box-shadow: 0 1px 3px rgba(0,0,0,.08);
}

.text-section h2 {
  font-size: 14px;
  font-weight: 600;
  color: #86868b;
  margin-bottom: 12px;
  text-transform: uppercase;
  letter-spacing: .5px;
}

.text-row {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
}

.text-row input {
  flex: 1;
  padding: 10px 14px;
  border: 1px solid #d2d2d7;
  border-radius: 8px;
  font-size: 15px;
  outline: none;
}

.text-row input:focus { border-color: #0071e3; }

.text-row button {
  padding: 10px 20px;
  background: #0071e3;
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 15px;
  cursor: pointer;
}

.text-row button:active { background: #005bb5; }

.text-latest {
  font-size: 13px;
  color: #86868b;
  min-height: 20px;
}

.text-latest strong { color: #1d1d1f; }

/* Upload Section */
.upload-section {
  background: #fff;
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 16px;
  box-shadow: 0 1px 3px rgba(0,0,0,.08);
}

.upload-section h2 {
  font-size: 14px;
  font-weight: 600;
  color: #86868b;
  margin-bottom: 12px;
  text-transform: uppercase;
}

.drop-zone {
  border: 2px dashed #d2d2d7;
  border-radius: 10px;
  padding: 32px;
  text-align: center;
  cursor: pointer;
  transition: border-color .2s, background .2s;
  margin-bottom: 12px;
}

.drop-zone:hover,
.drop-zone.dragover {
  border-color: #0071e3;
  background: rgba(0,113,227,.04);
}

.drop-zone p { color: #86868b; font-size: 14px; }
.drop-zone .hint { font-size: 12px; margin-top: 4px; }

#fileInput { display: none; }

.progress-wrap {
  display: none;
  margin-bottom: 12px;
}

.progress-bar-bg {
  background: #e5e5ea;
  border-radius: 4px;
  height: 8px;
  overflow: hidden;
}

.progress-bar-fill {
  background: #0071e3;
  height: 100%;
  width: 0%;
  transition: width .2s;
}

.progress-text {
  font-size: 12px;
  color: #86868b;
  margin-top: 4px;
}

/* File List */
.file-section {
  background: #fff;
  border-radius: 12px;
  padding: 16px;
  box-shadow: 0 1px 3px rgba(0,0,0,.08);
}

.file-section .header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}

.file-section h2 {
  font-size: 14px;
  font-weight: 600;
  color: #86868b;
  text-transform: uppercase;
}

.file-section .refresh-btn {
  background: none;
  border: 1px solid #d2d2d7;
  border-radius: 6px;
  padding: 4px 12px;
  font-size: 13px;
  cursor: pointer;
}

.file-table {
  width: 100%;
  border-collapse: collapse;
}

.file-table th {
  text-align: left;
  font-size: 12px;
  color: #86868b;
  padding: 8px 4px;
  border-bottom: 1px solid #e5e5ea;
}

.file-table td {
  padding: 10px 4px;
  border-bottom: 1px solid #f5f5f7;
  font-size: 14px;
}

.file-table tr:last-child td { border-bottom: none; }

.file-name { font-weight: 500; }
.file-meta { color: #86868b; font-size: 12px; margin-top: 2px; }
.file-actions { display: flex; gap: 6px; justify-content: flex-end; }

.file-actions button {
  padding: 4px 10px;
  border: none;
  border-radius: 6px;
  font-size: 12px;
  cursor: pointer;
}

.file-actions .dl-btn {
  background: #0071e3;
  color: #fff;
}

.file-actions .del-btn {
  background: #ff3b30;
  color: #fff;
}

.file-actions button:active { opacity: .8; }

.empty-state {
  text-align: center;
  padding: 32px;
  color: #86868b;
  font-size: 14px;
}

/* Mobile */
@media (max-width: 600px) {
  .container { padding: 12px; }
  .file-actions { flex-wrap: wrap; }
  .file-table th:nth-child(2),
  .file-table td:nth-child(2) { display: none; }
}
</style>
</head>
<body>

<header>
  <h1>ShareTool</h1>
  <span class="ip" id="serverInfo">--</span>
</header>

<div class="container">
  <!-- Text Clipboard -->
  <div class="text-section">
    <h2>剪贴板</h2>
    <div class="text-row">
      <input id="textInput" placeholder="输入文本分享到局域网..." />
      <button onclick="sendText()">发送</button>
    </div>
    <div class="text-latest" id="textLatest">等待接收文本...</div>
  </div>

  <!-- Upload -->
  <div class="upload-section">
    <h2>文件上传</h2>
    <div class="drop-zone" id="dropZone"
         onclick="document.getElementById('fileInput').click()">
      <p>点击选择文件 / 拖拽文件到此处</p>
      <p class="hint">支持多文件上传，大文件自动分片断点续传</p>
    </div>
    <input type="file" id="fileInput" multiple />
    <div class="progress-wrap" id="progressWrap">
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progressFill"></div>
      </div>
      <div class="progress-text" id="progressText">0%</div>
    </div>
    <div id="uploadStatus"></div>
  </div>

  <!-- File List -->
  <div class="file-section">
    <div class="header">
      <h2>文件列表</h2>
      <button class="refresh-btn" onclick="loadFiles()">刷新</button>
    </div>
    <div id="fileList"></div>
  </div>
</div>

<script>
const API = {
  base: '',
  async request(url, opts) {
    const res = await fetch(this.base + url, opts);
    if (!res.ok) throw new Error('Request failed: ' + res.status);
    return res.json();
  },
  sendText(content) {
    return this.request('/api/text', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({content})
    });
  },
  getLatestText() {
    return this.request('/api/text/latest');
  },
  listFiles() {
    return this.request('/api/files');
  },
  putFile(name, blob, offset, total) {
    return new Promise((resolve, reject) => {
      const xhr = new XMLHttpRequest();
      xhr.open('PUT', this.base + '/api/files/' + encodeURIComponent(name));
      if (offset !== undefined) {
        const end = offset + blob.size - 1;
        xhr.setRequestHeader('Content-Range', `bytes ${offset}-${end}/${total}`);
      }
      xhr.onload = () => {
        try { resolve(JSON.parse(xhr.responseText)); }
        catch { resolve({success: true}); }
      };
      xhr.onerror = () => reject(new Error('Network error'));
      xhr.send(blob);
    });
  },
  deleteFile(name) {
    return this.request('/api/files/' + encodeURIComponent(name), {method: 'DELETE'});
  }
};

// Detect server base URL
(function detectBase() {
  const proto = location.protocol === 'https:' ? 'https:' : 'http:';
  const port = location.port || (proto === 'https:' ? '443' : '80');
  API.base = proto + '//' + location.hostname + ':' + port;
  document.getElementById('serverInfo').textContent = location.host;
})();

// Text
async function sendText() {
  const input = document.getElementById('textInput');
  const content = input.value.trim();
  if (!content) return;
  try {
    await API.sendText(content);
    input.value = '';
  } catch(e) {
    alert('发送失败: ' + e.message);
  }
}

async function pollText() {
  try {
    const data = await API.getLatestText();
    const el = document.getElementById('textLatest');
    if (data.content) {
      const ago = data.timestamp ? timeAgo(data.timestamp) : '';
      el.innerHTML = '<strong>最新:</strong> ' + escHtml(data.content) + (ago ? ' (' + ago + ')' : '');
    }
  } catch {}
}

function timeAgo(ts) {
  const diff = Date.now() - ts;
  if (diff < 60000) return Math.floor(diff/1000) + '秒前';
  if (diff < 3600000) return Math.floor(diff/60000) + '分钟前';
  return Math.floor(diff/3600000) + '小时前';
}

// Upload
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const CHUNK = 2 * 1024 * 1024; // 2MB chunks

['dragenter','dragover'].forEach(ev => {
  dropZone.addEventListener(ev, e => {
    e.preventDefault();
    dropZone.classList.add('dragover');
  });
});
['dragleave','drop'].forEach(ev => {
  dropZone.addEventListener(ev, e => {
    e.preventDefault();
    dropZone.classList.remove('dragover');
  });
});

dropZone.addEventListener('drop', e => {
  fileInput.files = e.dataTransfer.files;
  if (fileInput.files.length) uploadFiles();
});

fileInput.addEventListener('change', () => {
  if (fileInput.files.length) uploadFiles();
});

async function uploadFiles() {
  const files = Array.from(fileInput.files);
  if (!files.length) return;
  const status = document.getElementById('uploadStatus');
  const progressWrap = document.getElementById('progressWrap');
  status.innerHTML = '';

  for (const file of files) {
    progressWrap.style.display = 'block';
    try {
      await uploadFile(file, file.name, file.size);
      status.innerHTML += '<p style="color:green;font-size:13px">✓ ' + escHtml(file.name) + ' 上传完成</p>';
    } catch(e) {
      status.innerHTML += '<p style="color:red;font-size:13px">✗ ' + escHtml(file.name) + ': ' + e.message + '</p>';
    }
  }
  fileInput.value = '';
  progressWrap.style.display = 'none';
  loadFiles();
}

async function uploadFile(file, name, total) {
  const fill = document.getElementById('progressFill');
  const text = document.getElementById('progressText');
  let offset = 0;

  while (offset < total) {
    const chunk = file.slice(offset, offset + CHUNK);
    const pct = Math.round((offset + chunk.size) / total * 100);
    fill.style.width = pct + '%';
    text.textContent = name + ' ' + pct + '%';

    await API.putFile(name, chunk, offset, total);
    offset += CHUNK;
  }
  fill.style.width = '100%';
  text.textContent = '100%';
}

// Files
async function loadFiles() {
  try {
    const data = await API.listFiles();
    const list = document.getElementById('fileList');
    if (!data.files || !data.files.length) {
      list.innerHTML = '<div class="empty-state">暂无文件，上传一个试试</div>';
      return;
    }
    const rows = ['<table class="file-table"><thead><tr><th>文件名</th><th>大小</th><th>时间</th><th></th></tr></thead><tbody>'];
    for (const f of data.files) {
      const url = API.base + '/api/files/' + encodeURIComponent(f.name);
      const dlUrl = '<a href="' + url + '" download="' + escHtml(f.name) + '">' + escHtml(f.name) + '</a>';
      rows.push('<tr>' +
        '<td class="file-name">' + dlUrl + '<div class="file-meta">' + formatBytes(f.size) + '</div></td>' +
        '<td>' + timeAgo(f.updatedAt) + '</td>' +
        '<td class="file-actions">' +
          '<a href="' + url + '" download="' + escHtml(f.name) + '"><button class="dl-btn">下载</button></a>' +
          '<button class="del-btn" onclick="doDelete(\'' + escHtml(f.name).replace(/'/g, "\\'") + '\')">删除</button>' +
        '</td>' +
      '</tr>');
    }
    rows.push('</tbody></table>');
    list.innerHTML = rows.join('');
  } catch(e) {
    document.getElementById('fileList').innerHTML =
      '<div class="empty-state">加载失败: ' + escHtml(e.message) + '</div>';
  }
}

async function doDelete(name) {
  if (!confirm('确认删除 ' + name + '？')) return;
  try {
    await API.deleteFile(name);
    loadFiles();
  } catch(e) {
    alert('删除失败: ' + e.message);
  }
}

function formatBytes(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1048576) return (bytes/1024).toFixed(1) + ' KB';
  if (bytes < 1073741824) return (bytes/1048576).toFixed(1) + ' MB';
  return (bytes/1073741824).toFixed(2) + ' GB';
}

function escHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

// Init
loadFiles();
setInterval(pollText, 3000);
</script>
</body>
</html>
