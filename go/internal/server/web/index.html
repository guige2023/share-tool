<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1d1d1f">
<meta name="description" content="ShareTool - 局域网剪贴板同步和文件分享">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.png">
<title>ShareTool</title>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  });
}
</script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #f5f5f7;
  color: #1d1d1f;
  min-height: 100vh;
}

header {
  background: #1d1d1f;
  color: #fff;
  padding: 12px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky;
  top: 0;
  z-index: 100;
}

header h1 { font-size: 18px; font-weight: 600; }

.header-right {
  display: flex;
  align-items: center;
  gap: 10px;
}

header .ip {
  font-size: 12px;
  color: #a1a1a6;
  background: #2c2c2e;
  padding: 4px 10px;
  border-radius: 12px;
}

/* Tab Navigation */
.tabs {
  display: flex;
  background: #fff;
  border-bottom: 1px solid #e5e5ea;
  position: sticky;
  top: 52px;
  z-index: 99;
}

.tab {
  flex: 1;
  padding: 12px 8px;
  text-align: center;
  font-size: 14px;
  font-weight: 500;
  color: #86868b;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all .2s;
}

.tab.active {
  color: #0071e3;
  border-bottom-color: #0071e3;
}

.container {
  max-width: 800px;
  margin: 0 auto;
  padding: 16px;
}

.panel { display: none; }
.panel.active { display: block; }

/* Text Section */
.text-section {
  background: #fff;
  border-radius: 12px;
  padding: 16px;
  box-shadow: 0 1px 3px rgba(0,0,0,.08);
}

.text-section h2 {
  font-size: 13px;
  font-weight: 600;
  color: #86868b;
  margin-bottom: 12px;
  text-transform: uppercase;
  letter-spacing: .5px;
}

.text-row {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
}

.text-row input {
  flex: 1;
  padding: 12px 14px;
  border: 1px solid #d2d2d7;
  border-radius: 10px;
  font-size: 16px;
  outline: none;
  min-height: 48px;
}

.text-row input:focus { border-color: #0071e3; }

.text-row button {
  padding: 12px 20px;
  background: #0071e3;
  color: #fff;
  border: none;
  border-radius: 10px;
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
  min-height: 48px;
}

.text-row button:active { background: #005bb5; }

.text-latest {
  font-size: 13px;
  color: #86868b;
  min-height: 20px;
  padding: 8px 12px;
  background: #f5f5f7;
  border-radius: 8px;
  word-break: break-all;
}

/* Upload Section */
.upload-section {
  background: #fff;
  border-radius: 12px;
  padding: 16px;
  box-shadow: 0 1px 3px rgba(0,0,0,.08);
}

.upload-section h2,
.file-section h2,
.devices-section h2 {
  font-size: 13px;
  font-weight: 600;
  color: #86868b;
  margin-bottom: 12px;
  text-transform: uppercase;
}

.drop-zone {
  border: 2px dashed #d2d2d7;
  border-radius: 12px;
  padding: 40px 20px;
  text-align: center;
  cursor: pointer;
  transition: border-color .2s, background .2s;
  margin-bottom: 12px;
}

.drop-zone:hover,
.drop-zone.dragover {
  border-color: #0071e3;
  background: rgba(0,113,227,.04);
}

.drop-zone p { color: #86868b; font-size: 15px; }
.drop-zone .hint { font-size: 12px; margin-top: 6px; }

.drop-icon {
  font-size: 36px;
  margin-bottom: 12px;
}

#fileInput { display: none; }

.progress-wrap { display: none; margin-bottom: 12px; }

.progress-bar-bg {
  background: #e5e5ea;
  border-radius: 4px;
  height: 8px;
  overflow: hidden;
}

.progress-bar-fill {
  background: linear-gradient(90deg, #0071e3, #5ac8fa);
  height: 100%;
  width: 0%;
  transition: width .3s ease;
  border-radius: 4px;
}

.progress-text {
  font-size: 12px;
  color: #86868b;
  margin-top: 4px;
  text-align: center;
}

.upload-status {
  font-size: 13px;
  margin-top: 8px;
}

.upload-status .ok { color: #34c759; }
.upload-status .err { color: #ff3b30; }

/* File List */
.file-section {
  background: #fff;
  border-radius: 12px;
  padding: 16px;
  box-shadow: 0 1px 3px rgba(0,0,0,.08);
}

.file-section .header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}

.file-section .refresh-btn {
  background: none;
  border: 1px solid #d2d2d7;
  border-radius: 8px;
  padding: 6px 14px;
  font-size: 13px;
  cursor: pointer;
  color: #0071e3;
}

.file-table {
  width: 100%;
  border-collapse: collapse;
}

.file-table th {
  text-align: left;
  font-size: 11px;
  color: #86868b;
  padding: 6px 4px;
  border-bottom: 1px solid #e5e5ea;
  text-transform: uppercase;
}

.file-table td {
  padding: 10px 4px;
  border-bottom: 1px solid #f5f5f7;
  font-size: 14px;
}

.file-table tr:last-child td { border-bottom: none; }

.file-name { font-weight: 500; word-break: break-all; }
.file-meta { color: #86868b; font-size: 12px; margin-top: 2px; }
.file-actions { display: flex; gap: 6px; justify-content: flex-end; }

.file-actions a { text-decoration: none; }

.file-actions button {
  padding: 5px 12px;
  border: none;
  border-radius: 6px;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
}

.file-actions .dl-btn {
  background: #0071e3;
  color: #fff;
}

.file-actions .del-btn {
  background: #ff3b30;
  color: #fff;
}

.file-actions button:active { opacity: .8; }

.empty-state {
  text-align: center;
  padding: 32px;
  color: #86868b;
  font-size: 14px;
}

/* Devices Section */
.devices-section {
  background: #fff;
  border-radius: 12px;
  padding: 16px;
  box-shadow: 0 1px 3px rgba(0,0,0,.08);
}

.device-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.device-card {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px;
  background: #f5f5f7;
  border-radius: 10px;
}

.device-icon {
  width: 40px;
  height: 40px;
  background: #0071e3;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}

.device-icon.computer { background: #0071e3; }
.device-icon.phone { background: #34c759; }
.device-icon.tablet { background: #ff9500; }

.device-info { flex: 1; min-width: 0; }
.device-name { font-weight: 600; font-size: 14px; }
.device-addr { font-size: 12px; color: #86868b; margin-top: 2px; }
.device-time { font-size: 11px; color: #aeaeb2; margin-top: 2px; }

.device-status {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #34c759;
  flex-shrink: 0;
}

.device-status.offline { background: #ff3b30; }

.add-device-btn {
  width: 100%;
  padding: 14px;
  border: 2px dashed #d2d2d7;
  border-radius: 10px;
  background: none;
  color: #86868b;
  font-size: 14px;
  cursor: pointer;
  margin-top: 10px;
}

.add-device-btn:hover { border-color: #0071e3; color: #0071e3; }

/* Text Entry */
.text-entry {
  padding: 12px;
  background: #f5f5f7;
  border-radius: 10px;
  margin-bottom: 8px;
}

.text-entry-content {
  font-size: 15px;
  line-height: 1.5;
  word-break: break-all;
  margin-bottom: 6px;
}

.text-entry-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 12px;
  color: #86868b;
}

.text-del-btn {
  background: none;
  border: 1px solid #d2d2d7;
  border-radius: 6px;
  padding: 3px 10px;
  font-size: 12px;
  color: #ff3b30;
  cursor: pointer;
}

.text-del-btn:hover { background: #fff0f0; }

.text-copy-btn {
  background: none;
  border: 1px solid #d2d2d7;
  border-radius: 6px;
  padding: 3px 10px;
  font-size: 12px;
  color: #0071e3;
  cursor: pointer;
}

.text-copy-btn:hover { background: #f0f7ff; }

.batch-delete-btn {
  display: none;
  background: #ff3b30;
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 6px 14px;
  font-size: 13px;
  cursor: pointer;
}

.batch-download-btn {
  display: none;
  background: #0071e3;
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 6px 14px;
  font-size: 13px;
  cursor: pointer;
}

/* Mobile */
@media (max-width: 600px) {
  .container { padding: 12px; }
  .file-actions { flex-wrap: wrap; }
  .batch-delete-btn, .batch-download-btn { display: none !important; }
  .file-table { display: block; overflow-x: auto; white-space: nowrap; }
  .drop-zone { padding: 30px 16px; }
}
</style>
</head>
<body>

<header>
  <h1>ShareTool</h1>
  <div class="header-right">
    <span class="ip" id="serverInfo">--</span>
    <img id="headerQR" width="32" height="32" style="border-radius:4px;cursor:pointer;display:none;" title="点击查看大二维码" onclick="showQRModal()" />
    <a href="/cert-guide" title="HTTPS证书安装指南" style="color:#a1a1a6;font-size:12px;text-decoration:none;padding:4px 8px;border-radius:12px;background:#2c2c2e;" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='#a1a1a6'">🔐证书</a>
  </div>
</header>

<!-- QR Modal -->
<div id="qrModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:999;align-items:center;justify-content:center;" onclick="closeQRModal(event)">
  <div style="background:#fff;border-radius:16px;padding:24px;text-align:center;max-width:320px;width:90%;" onclick="event.stopPropagation()">
    <p style="font-size:14px;font-weight:600;margin-bottom:16px;" id="qrModalUrl">--</p>
    <img id="qrModalImg" width="256" height="256" style="border-radius:8px;border:4px solid #f5f5f7;" />
    <p style="font-size:12px;color:#86868b;margin-top:12px;">用微信/相机扫码访问</p>
    <button onclick="closeQRModal()" style="margin-top:16px;padding:10px 24px;background:#1d1d1f;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:14px;">关闭</button>
  </div>
</div>

<!-- Tab Navigation -->
<div class="tabs">
  <div class="tab active" data-tab="files">📁 文件</div>
  <div class="tab" data-tab="text">📝 剪贴板</div>
</div>

<div class="container">
  <!-- Files Tab -->
  <div class="panel active" id="panel-files">
    <!-- Upload -->
    <div class="upload-section" style="margin-top:16px;">
      <div class="drop-zone" id="dropZone"
           onclick="document.getElementById('fileInput').click()">
        <div class="drop-icon">📤</div>
        <p>点击选择文件 / 拖拽文件到此处</p>
        <p class="hint">支持大文件分片断点续传</p>
      </div>
      <input type="file" id="fileInput" multiple />
      <div class="progress-wrap" id="progressWrap">
        <div class="progress-bar-bg">
          <div class="progress-bar-fill" id="progressFill"></div>
        </div>
        <div class="progress-text" id="progressText">0%</div>
        <div style="display:flex;gap:8px;margin-top:6px;">
          <button id="pauseBtn" style="display:none;font-size:12px;padding:4px 10px;border-radius:6px;border:none;background:#555;color:#fff;cursor:pointer;" onclick="pauseUpload()">暂停</button>
          <button id="resumeBtn" style="display:none;font-size:12px;padding:4px 10px;border-radius:6px;border:none;background:#34c759;color:#fff;cursor:pointer;" onclick="resumeUpload()">继续</button>
        </div>
      </div>
      <div class="upload-status" id="uploadStatus"></div>
    </div>

    <!-- File List -->
    <div class="file-section" style="margin-top:16px;">
      <div class="header">

          <h2 style="flex:1;">文件列表</h2>

        <div style="display:flex;gap:8px;">
          <button class="refresh-btn" onclick="loadFiles()">刷新</button>
          <button class="batch-delete-btn" id="batchDeleteBtn" onclick="batchDeleteFiles()">删除</button>
          <button class="batch-download-btn" id="batchDownloadBtn" onclick="batchDownloadFiles()">下载</button>
        </div>
      </div>
      <div id="fileList"></div>
    </div>
  </div>

  <!-- Text Tab -->
  <div class="panel" id="panel-text">
    <!-- Send box -->
    <div class="text-section" style="margin-top:16px;">
      <h2>发送文本</h2>
      <div class="text-row">
        <input id="textInput" placeholder="输入文本，发送给局域网内所有设备..." />
        <button onclick="sendText()">发送</button>
      </div>
      <!-- PWA clipboard buttons -->
      <div class="text-row" style="margin-top:8px;">
        <button onclick="pasteAndSend()" id="pasteBtn" style="background:#34c759;flex:1;">📋 粘贴并发送</button>
        <button onclick="copyLatest()" id="copyBtn" style="background:#ff9500;flex:1;">📄 复制最新</button>

    <!-- History -->

      <div class="header" style="margin-bottom:12px;">
        <h2>历史记录</h2>
        <button class="refresh-btn" onclick="clearTextHistory()" style="color:#ff3b30;border-color:#ff3b30;" id="clearHistoryBtn">清空全部</button>
      </div>
      <div id="textList"></div>

<script>
// Tab navigation
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('panel-' + tab.dataset.tab).classList.add('active');
    if (tab.dataset.tab === 'text') loadTextHistory();
  });
});

const API = {
  base: '',
  async request(url, opts) {
    const res = await fetch(this.base + url, opts);
    if (!res.ok) throw new Error('Request failed: ' + res.status);
    return res.json();
  },
  // Text
  sendText(content) {
    return fetch(this.base + '/api/text', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({content})
    }).then(r => r.json());
  },
  getTextHistory() {
    return this.request('/api/text');
  },
  deleteText(id) {
    return this.request('/api/text?id=' + encodeURIComponent(id), {method: 'DELETE'});
  },
  clearText() {
    return this.request('/api/text?all=true', {method: 'DELETE'});
  },
  // Files
  listFiles() {
    return this.request('/api/files');
  },
  putFile(name, blob, offset, total) {
    return new Promise((resolve, reject) => {
      const xhr = new XMLHttpRequest();
      xhr.open('PUT', this.base + '/api/files/' + encodeURIComponent(name));
      if (offset !== undefined) {
        xhr.setRequestHeader('Content-Range', `bytes ${offset}-${offset + blob.size - 1}/${total}`);
      }
      xhr.onload = () => {
        try { resolve(JSON.parse(xhr.responseText)); }
        catch { resolve({success: true}); }
      };
      xhr.onerror = () => reject(new Error('Network error'));
      xhr.send(blob);
    });
  },
  deleteFile(name) {
    return this.request('/api/files/' + encodeURIComponent(name), {method: 'DELETE'});
  },
  batchDeleteFiles(names) {
    return fetch(this.base + '/api/files', {
      method: 'DELETE',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({names})
    }).then(r => r.json());
  },
  // Upload session API
  async createUploadSession(filename, size, chunkSize = 2 * 1024 * 1024) {
    const res = await fetch(this.base + '/api/uploads', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({filename, size, chunk_size: chunkSize})
    });
    if (!res.ok) throw new Error('Failed to create upload session');
    return res.json();
  },
  async uploadChunk(sessionId, chunkIndex, chunk, sha256) {
    return new Promise((resolve, reject) => {
      const xhr = new XMLHttpRequest();
      xhr.open('PUT', this.base + '/api/uploads/' + sessionId + '/chunks/' + chunkIndex);
      xhr.setRequestHeader('Content-Type', 'application/octet-stream');
      if (sha256) xhr.setRequestHeader('X-Chunk-SHA256', sha256);
      xhr.onload = () => {
        if (xhr.status >= 200 && xhr.status < 300) {
          try { resolve(JSON.parse(xhr.responseText)); }
          catch { resolve({success: true}); }
        } else {
          reject(new Error('Chunk upload failed: ' + xhr.status));
        }
      };
      xhr.onerror = () => reject(new Error('Network error'));
      xhr.send(chunk);
    });
  },
  async getUploadStatus(sessionId) {
    const res = await fetch(this.base + '/api/uploads/' + sessionId + '/status');
    if (!res.ok) return null;
    return res.json();
  },
  async completeUpload(sessionId, sha256) {
    const res = await fetch(this.base + '/api/uploads/' + sessionId + '/complete', {
      method: 'POST',
      headers: {'X-Final-SHA256': sha256 || ''}
    });
    if (!res.ok) {
      const err = await res.text();
      throw new Error('Upload completion failed: ' + err);
    }
    return res.json();
  },
  async cancelUpload(sessionId) {
    await fetch(this.base + '/api/uploads/' + sessionId, {method: 'DELETE'});
  },
  // Batch download as zip (streamed from server)
  batchDownloadZip(names) {
    if (names.length === 0) return;
    const url = this.base + '/api/blobs/download?ids=' + names.map(encodeURIComponent).join(',');
    const a = document.createElement('a');
    a.href = url;
    a.download = 'files.zip';
    a.style.display = 'none';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  }
};

// Detect server base URL
(function() {
  const proto = location.protocol === 'https:' ? 'https:' : 'http:';
  const port = location.port || (proto === 'https:' ? '443' : '80');
  API.base = proto + '//' + location.hostname + ':' + port;
  document.getElementById('serverInfo').textContent = location.host;

  // Header QR icon
  const headerQR = document.getElementById('headerQR');
  headerQR.src = API.base + '/api/qr?url=' + encodeURIComponent(location.href);
  headerQR.style.display = 'inline';
})();

// Handle Web Share Target: when app is opened via system share sheet,
// the shared data appears as URL parameters.
(function() {
  const params = new URLSearchParams(location.search);
  const sharedTitle = params.get('title');
  const sharedText = params.get('text');
  const sharedUrl = params.get('url');
  if (sharedTitle || sharedText || sharedUrl) {
    const content = [sharedTitle, sharedText, sharedUrl].filter(Boolean).join('\n');
    // Show a "Shared from Share Sheet" banner with send button
    const banner = document.createElement('div');
    banner.id = 'share-sheet-banner';
    banner.style.cssText = 'background:#667eea;color:#fff;padding:12px 16px;border-radius:8px;margin-bottom:16px;font-size:14px;display:flex;align-items:center;justify-content:space-between;gap:12px;';
    banner.innerHTML = '<div style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"><b>来自分享</b>: ' + escHtml(content.slice(0, 60)) + '</div><button id="sendSharedBtn" style="background:#fff;color:#667eea;border:none;border-radius:6px;padding:6px 14px;cursor:pointer;font-weight:600;white-space:nowrap;">发送</button>';
    document.querySelector('.container').prepend(banner);
    document.getElementById('sendSharedBtn').addEventListener('click', function() {
      fetch(API.base + '/api/text', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({content})
      }).then(function() {
        banner.innerHTML = '<b style="color:#34c759;">✓ 已发送</b>';
        setTimeout(function() { banner.remove(); }, 2000);
      }).catch(function() {
        banner.innerHTML = '<b style="color:#ff3b30;">发送失败</b>';
      });
    });
  }
})();

function escHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

function timeAgo(ts) {
  const diff = Date.now() - ts;
  if (diff < 60000) return Math.floor(diff/1000) + '秒前';
  if (diff < 3600000) return Math.floor(diff/60000) + '分钟前';
  return Math.floor(diff/3600000) + '小时前';
}

function formatBytes(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1048576) return (bytes/1024).toFixed(1) + ' KB';
  if (bytes < 1073741824) return (bytes/1048576).toFixed(1) + ' MB';
  return (bytes/1073741824).toFixed(2) + ' GB';
}

// ─── Text History ────────────────────────────────────────────────────────────

async function sendText() {
  const input = document.getElementById('textInput');
  const content = input.value.trim();
  if (!content) return;
  try {
    await API.sendText(content);
    input.value = '';
    loadTextHistory();
  } catch(e) {
    alert('发送失败: ' + e.message);
  }
}

let textEntries = []; // 缓存当前历史，供 copyText 使用

async function loadTextHistory() {
  const list = document.getElementById('textList');
  try {
    const data = await API.getTextHistory();
    textEntries = data.entries || [];
    if (!data.entries || !data.entries.length) {
      list.innerHTML = '<div class="empty-state" style="padding:24px;">暂无历史记录</div>';
      return;
    }
    list.innerHTML = data.entries.map(e => {
      const time = new Date(e.timestamp).toLocaleString('zh-CN');
      return '<div class="text-entry">' +
        '<div class="text-entry-content">' + escHtml(e.content) + '</div>' +
        '<div class="text-entry-meta">' +
          '<span>' + time + '</span>' +
          '<div style="display:flex;gap:6px;">' +
            '<button class="text-copy-btn" data-id="' + e.id + '" onclick="copyText(this)">复制</button>' +
            '<button class="text-del-btn" onclick="deleteText(\'' + e.id + '\')">删除</button>' +
          '</div>' +
        '</div>' +
      '</div>';
    }).join('');
  } catch(e) {
    list.innerHTML = '<div class="empty-state">加载失败: ' + escHtml(e.message) + '</div>';
  }
}

async function deleteText(id) {
  if (!confirm('确认删除？')) return;
  try {
    await API.deleteText(id);
    loadTextHistory();
  } catch(e) {
    alert('删除失败: ' + e.message);
  }
}

function copyText(btn) {
  const id = btn.dataset.id;
  const entry = textEntries.find(e => e.id === id);
  if (!entry) return;
  // 使用 textarea + execCommand 兼容 HTTP 场景
  const ta = document.createElement('textarea');
  ta.value = entry.content;
  ta.style.cssText = 'position:fixed;top:-9999px;left:-9999px;';
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  try { document.execCommand('copy'); } catch(e) {}
  document.body.removeChild(ta);
  btn.textContent = '已复制';
  btn.style.color = '#34c759';
  setTimeout(() => { btn.textContent = '复制'; btn.style.color = ''; }, 1500);
}

async function clearTextHistory() {
  if (!confirm('确认清空全部历史记录？')) return;
  try {
    await API.clearText();
    loadTextHistory();
  } catch(e) {
    alert('清空失败: ' + e.message);
  }
}

// ─── File Upload ─────────────────────────────────────────────────────────────

const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const CHUNK = 2 * 1024 * 1024;

['dragenter','dragover'].forEach(ev => {
  dropZone.addEventListener(ev, e => { e.preventDefault(); dropZone.classList.add('dragover'); });
});
['dragleave','drop'].forEach(ev => {
  dropZone.addEventListener(ev, e => { e.preventDefault(); dropZone.classList.remove('dragover'); });
});

dropZone.addEventListener('drop', e => {
  fileInput.files = e.dataTransfer.files;
  if (fileInput.files.length) uploadFiles();
});

fileInput.addEventListener('change', () => {
  if (fileInput.files.length) uploadFiles();
});

// Upload state for pause/resume
const uploadState = {};

async function uploadFiles() {
  const files = Array.from(fileInput.files);
  if (!files.length) return;
  const status = document.getElementById('uploadStatus');
  const progressWrap = document.getElementById('progressWrap');
  status.innerHTML = '';

  for (const file of files) {
    progressWrap.style.display = 'block';
    try {
      await uploadFileWithSession(file);
      status.innerHTML += '<p class="ok">✓ ' + escHtml(file.name) + ' 上传完成</p>';
    } catch(e) {
      status.innerHTML += '<p class="err">✗ ' + escHtml(file.name) + ': ' + e.message + '</p>';
    }
  }
  fileInput.value = '';
  progressWrap.style.display = 'none';
  loadFiles();
}

// Concurrent chunked upload with session API, resume, and retry
async function uploadFileWithSession(file) {
  const name = file.name;
  const total = file.size;
  const CHUNK_SIZE = 2 * 1024 * 1024; // 2MB chunks
  const CONCURRENCY = 3;
  const MAX_RETRIES = 3;

  const fill = document.getElementById('progressFill');
  const text = document.getElementById('progressText');

  // Create upload session
  let session;
  try {
    session = await API.createUploadSession(name, total, CHUNK_SIZE);
  } catch(e) {
    // Fall back to legacy PUT if session creation fails
    showPauseResumeButtons(false);
    await uploadFileLegacy(file);
    return;
  }

  const {session_id, chunk_count} = session;
  uploadState[session_id] = { cancelled: false };
  currentSessionId = session_id;
  showPauseResumeButtons(true);

  // Compute total SHA256 incrementally as we upload
  const sha256Ctx = await sha256Init();

  // Determine starting chunk (resume support)
  let status;
  try {
    status = await API.getUploadStatus(session_id);
  } catch(e) { status = null; }

  const doneChunks = new Set(status && status.chunks_done ? status.chunks_done : []);
  const totalChunks = chunk_count;

  // Upload chunks concurrently
  let chunkIndex = 0;
  let completed = 0;
  let errors = 0;

  const updateProgress = () => {
    const pct = Math.round((completed / totalChunks) * 100);
    fill.style.width = pct + '%';
    text.textContent = name + ' ' + pct + '% (' + completed + '/' + totalChunks + ')';
  };

  const uploadChunkWithRetry = async (idx) => {
    if (uploadState[session_id] && uploadState[session_id].cancelled) return;
    if (doneChunks.has(idx)) { completed++; updateProgress(); return; }

    const start = idx * CHUNK_SIZE;
    const end = Math.min(start + CHUNK_SIZE, total);
    const chunk = file.slice(start, end);

    for (let attempt = 0; attempt < MAX_RETRIES; attempt++) {
      try {
        if (uploadState[session_id] && uploadState[session_id].cancelled) return;
        await API.uploadChunk(session_id, idx, chunk);
        completed++;
        updateProgress();
        return;
      } catch(e) {
        if (attempt === MAX_RETRIES - 1) errors++;
      }
      await new Promise(r => setTimeout(r, 500 * (attempt + 1)));
    }
  };

  // Process chunks with controlled concurrency
  const running = [];
  const processNext = async () => {
    while (chunkIndex < totalChunks && running.length < CONCURRENCY) {
      const idx = chunkIndex++;
      const p = uploadChunkWithRetry(idx).finally(() => {
        const i = running.indexOf(p);
        if (i >= 0) running.splice(i, 1);
      });
      running.push(p);
    }
    if (running.length > 0) {
      await Promise.race(running);
    }
  };

  while (chunkIndex < totalChunks || running.length > 0) {
    if (uploadState[session_id] && uploadState[session_id].cancelled) {
      await API.cancelUpload(session_id);
      throw new Error('上传已取消');
    }
    await processNext();
    await new Promise(r => setTimeout(r, 10));
  }

  if (errors > 0) {
    throw new Error(`${errors} 个分片上传失败`);
  }

  // Complete upload
  await API.completeUpload(session_id);
  fill.style.width = '100%';
  text.textContent = name + ' 100%';
  showPauseResumeButtons(false);
  delete uploadState[session_id];
  currentSessionId = null;
}

// Fallback: legacy sequential chunked upload via PUT /api/files/{name}
async function uploadFileLegacy(file) {
  const name = file.name;
  const total = file.size;
  const fill = document.getElementById('progressFill');
  const text = document.getElementById('progressText');
  let offset = 0;

  while (offset < total) {
    const chunk = file.slice(offset, offset + CHUNK);
    const pct = Math.round((offset + chunk.size) / total * 100);
    fill.style.width = pct + '%';
    text.textContent = name + ' ' + pct + '%';
    await API.putFile(name, chunk, offset, total);
    offset += CHUNK;
  }
  fill.style.width = '100%';
  text.textContent = '100%';
}

// Incremental SHA256 (streaming) via SubtleCrypto
let currentSessionId = null;
let isPaused = false;

function pauseUpload() {
  if (currentSessionId && uploadState[currentSessionId]) {
    uploadState[currentSessionId].cancelled = true;
    isPaused = true;
    document.getElementById('pauseBtn').style.display = 'none';
    document.getElementById('resumeBtn').style.display = 'inline-block';
  }
}

function resumeUpload() {
  // Resume by re-uploading remaining chunks
  isPaused = false;
  document.getElementById('pauseBtn').style.display = 'inline-block';
  document.getElementById('resumeBtn').style.display = 'none';
  // The concurrent loop will automatically pick up remaining work
}

function showPauseResumeButtons(show) {
  document.getElementById('pauseBtn').style.display = show ? 'inline-block' : 'none';
  document.getElementById('resumeBtn').style.display = 'none';
}

// ─── File List + Batch Selection ─────────────────────────────────────────────

let selectedFiles = new Set();

async function loadFiles() {
  selectedFiles.clear();
  const selectAll = document.getElementById('selectAllFiles');
  if (selectAll) selectAll.checked = false;
  updateBatchButtons();

  try {
    const data = await API.listFiles();
    const list = document.getElementById('fileList');
    if (!data.files || !data.files.length) {
      list.innerHTML = '<div class="empty-state">暂无文件，上传一个试试</div>';
      return;
    }
    const rows = ['<table class="file-table"><thead><tr>' +
      '<th style="width:32px;"></th>' +
      '<th>文件名</th>' +
      '<th style="width:130px;"></th></tr></thead><tbody>'];
    for (const f of data.files) {
      const escName = escHtml(f.name);
      const url = API.base + '/api/files/' + encodeURIComponent(f.name);
      rows.push('<tr data-name="' + escName + '">' +
        '<td><input type="checkbox" class="file-check" value="' + escName + '" onchange="toggleFile(this)" style="width:16px;height:16px;cursor:pointer;" /></td>' +
        '<td class="file-name">' + escName + '<div class="file-meta">' + formatBytes(f.size) + ' · ' + timeAgo(f.updatedAt) + '</div></td>' +
        '<td class="file-actions">' +
          '<a href="' + url + '" download="' + escName + '"><button class="dl-btn">下载</button></a>' +
          '<button class="del-btn" onclick="doDelete(\'' + escName.replace(/'/g, "\\'") + '\')">删除</button>' +
        '</td>' +
      '</tr>');
    }
    rows.push('</tbody></table>');
    list.innerHTML = rows.join('');
  } catch(e) {
    document.getElementById('fileList').innerHTML =
      '<div class="empty-state">加载失败: ' + escHtml(e.message) + '</div>';
  }
}

function toggleFile(cb) {
  const name = cb.value;
  if (cb.checked) {
    selectedFiles.add(name);
  } else {
    selectedFiles.delete(name);
  }
  updateBatchButtons();
}

function toggleSelectAll() {
  const cb = document.getElementById('selectAllFiles');
  const allCbs = document.querySelectorAll('.file-check');
  allCbs.forEach(c => {
    c.checked = cb.checked;
    if (cb.checked) selectedFiles.add(c.value);
    else selectedFiles.delete(c.value);
  });
  updateBatchButtons();
}

function updateBatchButtons() {
  const n = selectedFiles.size;
  const delBtn = document.getElementById('batchDeleteBtn');
  const dlBtn = document.getElementById('batchDownloadBtn');
  if (delBtn) delBtn.style.display = n > 0 ? 'inline-block' : 'none';
  if (dlBtn) dlBtn.textContent = n > 0 ? '下载(' + n + ')' : '下载';
  dlBtn && (dlBtn.style.display = n > 0 ? 'inline-block' : 'none');
}

async function batchDeleteFiles() {
  if (selectedFiles.size === 0) return;
  const names = Array.from(selectedFiles);
  if (!confirm('确认删除 ' + names.length + ' 个文件？')) return;
  try {
    await API.batchDeleteFiles(names);
    selectedFiles.clear();
    loadFiles();
  } catch(e) {
    alert('批量删除失败: ' + e.message);
  }
}

function batchDownloadFiles() {
  const names = Array.from(selectedFiles);
  if (names.length === 0) return;
  if (names.length === 1) {
    const url = API.base + '/api/files/' + encodeURIComponent(names[0]);
    const a = document.createElement('a');
    a.href = url;
    a.download = names[0];
    a.click();
  } else {
    // 多个文件：用 zip stream 下载（服务器端压缩成一个文件）
    API.batchDownloadZip(names);
  }
}

async function doDelete(name) {
  if (!confirm('确认删除 ' + name + '？')) return;
  try {
    await API.deleteFile(name);
    loadFiles();
  } catch(e) {
    alert('删除失败: ' + e.message);
  }
}

// ─── PWA: Clipboard API ─────────────────────────────────────────────────────

async function pasteAndSend() {
  if (!navigator.clipboard || !navigator.clipboard.readText) {
    alert('当前浏览器不支持剪贴板 API，请使用 HTTPS 或 localhost');
    return;
  }
  try {
    const text = await navigator.clipboard.readText();
    if (!text || !text.trim()) {
      alert('剪贴板为空');
      return;
    }
    const input = document.getElementById('textInput');
    input.value = text;
    await sendText();
  } catch(e) {
    // User denied permission or other error
    if (e.name === 'NotAllowedError') {
      alert('请允许访问剪贴板权限后重试');
    } else {
      alert('读取剪贴板失败: ' + e.message);
    }
  }
}

async function copyLatest() {
  if (!navigator.clipboard || !navigator.clipboard.writeText) {
    alert('当前浏览器不支持剪贴板 API');
    return;
  }
  if (!textEntries.length) {
    alert('暂无历史记录');
    return;
  }
  try {
    await navigator.clipboard.writeText(textEntries[0].content);
    showToast('已复制到剪贴板');
  } catch(e) {
    if (e.name === 'NotAllowedError') {
      alert('请允许写入剪贴板权限后重试');
    } else {
      alert('复制失败: ' + e.message);
    }
  }
}

function showToast(msg) {
  const existing = document.getElementById('toast');
  if (existing) existing.remove();
  const div = document.createElement('div');
  div.id = 'toast';
  div.textContent = msg;
  Object.assign(div.style, {
    position: 'fixed', bottom: '80px', left: '50%', transform: 'translateX(-50%)',
    background: '#1d1d1f', color: '#fff', padding: '10px 20px', borderRadius: '8px',
    fontSize: '14px', zIndex: '9999', opacity: '0',
    transition: 'opacity .3s'
  });
  document.body.appendChild(div);
  requestAnimationFrame(() => div.style.opacity = '1');
  setTimeout(() => { div.style.opacity = '0'; setTimeout(() => div.remove(), 300); }, 2000);
}

// ─── PWA: Web Share Target URL param processing ─────────────────────────────
// Handle shared data from Web Share Target API (?title=...&text=...&url=...)
async function handleShareTarget() {
  const params = new URLSearchParams(location.search);
  const title = params.get('title') || '';
  const text = params.get('text') || '';
  const url = params.get('url') || '';
  // Clear URL params without reloading
  if (title || text || url) {
    history.replaceState({}, '', location.pathname);
    // Switch to text tab and pre-fill
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.querySelector('.tab[data-tab="text"]').classList.add('active');
    document.getElementById('panel-text').classList.add('active');
    const combined = [title, text, url].filter(Boolean).join('\n');
    if (combined) {
      document.getElementById('textInput').value = combined;
      // Auto-send after 500ms delay (user can cancel)
      setTimeout(() => {
        if (confirm('检测到分享内容，是否发送到局域网设备？\n\n' + combined.substring(0, 100))) {
          sendText();
        }
      }, 300);
    }
  }
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.ready.then(() => {
