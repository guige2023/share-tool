name: ShareTool
options:
  bundleIdPrefix: com.sharetool
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    PRODUCT_NAME: ShareTool
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Manual
    DEVELOPMENT_TEAM: ""
    ENABLE_HARDENED_RUNTIME: NO

targets:
  ShareTool:
    type: application
    platform: macOS
    sources:
      - path: ShareTool/Sources
        type: group
    resources:
      - path: ShareTool/Resources
        type: group
      - path: ShareTool/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sharetool.app
        INFOPLIST_FILE: ShareTool/Info.plist
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/../Frameworks"
        COMBINE_HIDPI_IMAGES: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        LSUIElement: YES
    info:
      path: ShareTool/Info.plist
      properties:
        CFBundleName: ShareTool
        CFBundleDisplayName: ShareTool
        CFBundleIdentifier: com.sharetool.app
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0.0"
        CFBundlePackageType: APPL
        CFBundleExecutable: ShareTool
        LSMinimumSystemVersion: "13.0"
        LSUIElement: true
        NSHumanReadableCopyright: "Copyright © 2026. All rights reserved."
        NSHighResolutionCapable: true
