name: ShareTool
options:
  bundleIdPrefix: com.sharetool
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    PRODUCT_NAME: ShareTool
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Manual

targets:
  ShareTool:
    type: application
    platform: macOS
    sources:
      - path: Sources
        type: group
      - path: Resources
        type: group
        optional: true
      - path: Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sharetool.app
        INFOPLIST_FILE: Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/../Frameworks"
        COMBINE_HIDPI_IMAGES: YES
        ENABLE_APP_SANDBOX: NO
    preBuildScripts:
      - name: Copy ShareTool Binary
        script: |
          # Create the executables directory inside the bundle
          mkdir -p "${BUILT_PRODUCTS_DIR}/${EXECUTABLE_NAME}.app/Contents/ShareTool-bin"
          # Copy the Go binary: check in .xcodeproj/../ (same dir as project) first
          GO_BIN=""
          if [ -f "${SRCROOT}/../sharetool_darwin_amd64" ]; then
            GO_BIN="${SRCROOT}/../sharetool_darwin_amd64"
          elif [ -f "${SRCROOT}/../sharetool_darwin_arm64" ]; then
            GO_BIN="${SRCROOT}/../sharetool_darwin_arm64"
          fi
          if [ -n "$GO_BIN" ]; then
            cp -f "$GO_BIN" "${BUILT_PRODUCTS_DIR}/${EXECUTABLE_NAME}.app/Contents/ShareTool-bin/sharetool"
            chmod +x "${BUILT_PRODUCTS_DIR}/${EXECUTABLE_NAME}.app/Contents/ShareTool-bin/sharetool"
            echo "Copied: $GO_BIN"
          else
            echo "WARNING: Go binary not found, app will run in client-only mode"
          fi
        basedOnDependencyAnalysis: false
